<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Doações e Comodatos - Casa Civil de Minas Gerais</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.29/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

    <style>
        /* ============================================================
           1. VARIÁVEIS DE CORES
        ============================================================ */
        :root {
            --primary-dark:      #1a3a5c;
            --primary-darker:    #0f2a44;
            --accent-red:        #b93c42;
            --accent-bright:     #db233f;
            --background-light:  #f5f7fa;
            --success-green:     #28a745;
            --warning-yellow:    #ffc107;
            --info-blue:         #17a2b8;
        }

        /* ============================================================
           2. RESET E CONFIGURAÇÕES GLOBAIS
        ============================================================ */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; overflow-x: hidden; margin: 0; padding: 0; height: auto; min-height: auto; }
        body {
            font-family: 'Montserrat', Segoe UI, Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--background-light);
            padding-bottom: 15px;
            overflow-x: hidden;
        }
        body, button, input, select, textarea, span, div { font-family: 'Montserrat', sans-serif !important; }
        .material-icons { font-family: 'Material Icons' !important; font-size: 14px; vertical-align: middle; }

        /* ============================================================
           3. LAYOUT PRINCIPAL
        ============================================================ */
        .main-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .container-fluid { width: 100%; max-width: 88% !important; padding: 0 40px; margin: 0; }
        .dashboard-container { width: 100%; max-width: 100%; padding: 0 40px; margin: 0 auto; }
        .tab-content, .tab-pane { width: 100%; height: auto; min-height: auto; overflow: visible; }
        .table-container { height: auto; min-height: auto; overflow: visible; position: relative; }
        .iframe-mode { overflow: visible !important; }

        /* ============================================================
           4. DATA DE ATUALIZAÇÃO
        ============================================================ */
        .data-atualizacao-container { display: flex; justify-content: left; align-items: center; margin: 15px 0; }
        .data-atualizacao-box {
            background: transparent !important;
            border-radius: 8px;
            padding: 8px 15px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
            color: var(--primary-dark);
            font-weight: 600;
            box-shadow: none;
        }
        .data-atualizacao-box i { font-size: 14px; color: var(--accent-red); }

        /* ============================================================
           5. FILTROS
        ============================================================ */
        .filter-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.08);
            padding: 20px;
            margin-bottom: 20px;
            width: 100%;
        }
        .filter-label { font-size: 13px; font-weight: 600; color: #1a3a5c; margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; display: block; }
        .filter-label i { font-size: 14px; color: var(--accent-red); }
        .form-control, .form-select {
            border: 2px solid #e9ecef;
            border-radius: 6px;
            padding: 10px 12px;
            font-size: 13px;
            transition: all 0.3s ease;
            height: auto;
            width: 100%;
        }
        .form-control:focus, .form-select:focus { border-color: var(--accent-red); box-shadow: 0 0 0 2px rgba(185,60,66,0.15); }
        .modern-select {
            border: 1.5px solid #dfe5ec !important;
            border-radius: 8px !important;
            padding: 10px 12px !important;
            font-size: 14px !important;
            height: 48px !important;
            line-height: 1.5 !important;
            background-color: #fff;
            transition: all 0.2s ease;
            width: 100%;
        }
        .modern-select:focus { border-color: #1a3a5c !important; box-shadow: 0 0 0 2px rgba(26,58,92,0.1); }
        .filters-row { display: flex; gap: 15px; width: 100%; flex-wrap: wrap; }
        .filter-group { flex: 1; min-width: 120px; }
        .consulta-filters-row { display: flex; flex-wrap: wrap; gap: 15px; width: 100%; }
        .consulta-filter-group { flex: 1 1 calc(33.333% - 15px); min-width: 200px; }
        .consulta-buttons-row { display: flex; gap: 10px; width: 100%; margin-top: 15px; justify-content: flex-start; flex-wrap: wrap; }
        .botoes-abaixo { margin-top: 15px; display: flex; gap: 10px; flex-wrap: wrap; }

        /* ============================================================
           6. CARDS DE MÉTRICAS
        ============================================================ */
        .metric-card {
            background: white;
            border-radius: 8px;
            border: 1px solid #e5e9ef;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            overflow: hidden;
            height: 100%;
            transition: box-shadow 0.25s ease, transform 0.25s ease;
        }
        .metric-card:hover { box-shadow: 0 8px 24px rgba(26,58,92,0.13); transform: translateY(-2px); }
        .metric-header {
            background: #20445d;
            color: white;
            font-size: 13px;
            font-weight: 600;
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .metric-body { padding: 12px 15px; }
        .metric-value { font-size: 20px; font-weight: 700; color: #171c21; }
        .metric-sublabel { font-size: 10px; color: #94a3b8; font-weight: 500; margin-top: 2px; }

        /* ============================================================
           7. GRÁFICOS
        ============================================================ */
        .chart-container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.06);
            margin-bottom: 20px;
            padding: 0;
            overflow: hidden;
        }
        .chart-header { background: #20445d; color: white; padding: 12px 16px; margin: 0; }
        .chart-title { font-size: 14px; font-weight: 600; color: white; margin: 0; }
        .chart-wrapper { height: 300px; display: flex; align-items: center; justify-content: center; padding: 10px 15px; width: 100%; }
        .chart-container.chart-pizza-container { min-height: auto; }
        .chart-wrapper.chart-pizza { height: auto; display: flex; align-items: center; justify-content: center; padding: 10px 20px 0 20px; }
        .chart-pizza-layout { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 100%; gap: 10px; padding: 10px 20px; }
        .chart-pizza-box { width: 200px; height: 200px; flex-shrink: 0; }
        .legend-grid { display: grid; grid-template-columns: 1fr 1fr; justify-content: center; align-items: flex-start; gap: 6px 20px; font-size: 8px; width: 100%; padding: 4px 10px 10px; }
        .legend-item { display: flex; align-items: center; gap: 6px; }
        .legend-color { width: 12px; height: 12px; border-radius: 2px; flex-shrink: 0; }

        /* ============================================================
           8. TABELAS
        ============================================================ */
        .table-badge { background: #1a3a5c; color: white; padding: 5px 12px; border-radius: 12px; font-size: 12px; font-weight: 600; white-space: nowrap; }
        .table-fixed-header-container { position: relative; overflow: auto; width: 100%; max-height: 600px; }
        .table-fixed-header-container table thead th {
            background-color: #54697b !important;
            color: white !important;
            position: sticky;
            top: 0;
            z-index: 10;
            font-weight: 600;
            padding: 12px 10px;
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        .table { width: 100%; font-size: 13px; border-collapse: collapse; table-layout: auto; }
        .table th, .table td { border: 1px solid #d6dee6; }
        .table thead th {
            background-color: #54697b !important;
            color: white !important;
            font-weight: 600;
            font-size: 12px;
            padding: 12px 10px;
            text-transform: uppercase;
            border: 1px solid #d6dee6;
            cursor: pointer;
            user-select: none;
        }
        .table thead th:first-child { border-top-left-radius: 8px; }
        .table thead th:last-child  { border-top-right-radius: 8px; }
        .table thead th:hover { background-color: #3d5566 !important; }
        .sortable-header { cursor: pointer; position: relative; padding-right: 22px !important; }
        .sortable-header:hover { background-color: #3d5566 !important; }
        .sortable-header i { font-size: 13px; position: absolute; right: 5px; top: 50%; transform: translateY(-50%); opacity: 0.8; }
        .table tbody tr { background-color: #ffffff; }
        .table tbody td { padding: 10px 10px; vertical-align: middle; border-bottom: 1px solid #f1f1f1; font-size: 12px; }
        .table tbody tr:hover { background-color: rgba(41,67,90,0.04); }
        .table tfoot { position: sticky; bottom: 0; z-index: 20; }
        .table tfoot tr, .table tfoot td { background-color: #dfe3e8 !important; font-weight: 700; font-size: 12px; }
        .table-bordered { border: 1px solid #dee2e6; width: 100%; }
        .table-bordered th, .table-bordered td { border: 1px solid #dee2e6; padding: 12px; vertical-align: top; }
        .orgao-link { color: #006a82; text-decoration: none; font-weight: 400; cursor: pointer; }
        .orgao-link:hover { color: var(--accent-red); text-decoration: underline; }
        .nome-link { color: #006a82 !important; text-decoration: none !important; font-weight: 400; }
        .nome-link:hover { color: #b93c42 !important; text-decoration: underline !important; }

        /* ============================================================
           9. BOTÕES
        ============================================================ */
        .btn-pesquisa {
            background: linear-gradient(to right, #20445d, #20445d);
            border: none;
            padding: 0 16px;
            font-weight: 600;
            border-radius: 6px;
            transition: all 0.3s ease;
            font-size: 13px;
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
        }
        .btn-pesquisa:hover { background: linear-gradient(to right, var(--accent-red), #a32c32); transform: translateY(-1px); box-shadow: 0 4px 12px rgba(185,60,66,0.2); color: white; }
        .btn-secondary-custom {
            background: white;
            border: 2px solid var(--primary-darker);
            color: var(--primary-darker);
            padding: 0 16px;
            font-weight: 600;
            font-size: 13px;
            border-radius: 6px;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            height: 36px;
            white-space: nowrap;
            text-decoration: none !important;
        }
        .btn-secondary-custom:hover { background-color: #132837 !important; color: white !important; border-color: #132837 !important; }
        .btn-export {
            appearance: none;
            -webkit-appearance: none;
            background: transparent !important;
            border: 1px solid #d6dee6;
            color: #1a3a5c;
            padding: 0 14px;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            height: 32px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-export i { font-size: 14px !important; }
        button.btn-export:hover, a.btn-export:hover { background-color: #1a3a5c !important; border-color: #1a3a5c !important; color: #ffffff !important; }
        .btn-action {
            padding: 4px;
            border-radius: 7px;
            border: 1.5px solid #1a3a5c;
            background-color: #ffffff;
            color: #1a3a5c;
            width: 32px;
            height: 30px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            cursor: pointer;
        }
        .btn-action:hover { background-color: #1a3a5c; color: #ffffff; }
        .btn-topo {
            background: #eeeff5;
            color: #1a3a5c;
            border: 1px solid #d6dee6;
            border-radius: 12px;
            padding: 0 16px;
            font-size: 13px;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            gap: 4px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: all 0.3s ease;
            height: 32px;
        }
        .btn-topo:hover { background-color: #1a3a5c; color: #ffffff; border-color: #1a3a5c; }

        /* ============================================================
           10. NAVEGAÇÃO (abas)
        ============================================================ */
        .nav-tabs-container { background: transparent; padding: 10px 0; margin-top: 15px; margin-bottom: 15px; width: 100%; }
        .nav-tabs { border: none !important; gap: 10px; width: 100%; flex-wrap: wrap; }
        .nav-tabs .nav-link {
            border: none !important;
            background: #ffffff !important;
            border-radius: 10px !important;
            padding: 8px 18px !important;
            font-weight: 500;
            font-size: 14px;
            color: #1a3a5c !important;
            display: inline-flex !important;
            align-items: center;
            gap: 6px;
            transition: all .25s ease;
        }
        .nav-tabs .nav-link:hover { background: #e6e9ed !important; }
        .nav-tabs .nav-link.active { background: #234c63 !important; color: #fff !important; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .nav-tabs .material-icons { font-size: 14px !important; }

        /* ============================================================
           11. MODAL
        ============================================================ */
        .modal-full-custom { max-width: 82% !important; width: 82% !important; }
        .modal-creative .modal-header {
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary-darker) 100%);
            color: white !important;
            padding: 15px 20px;
            border-bottom: none;
        }
        .modal-creative .modal-header .modal-title { color: white !important; font-weight: 600; font-size: 14px; display: flex; align-items: center; gap: 8px; }
        .modal-creative .modal-header .btn-close { filter: brightness(0) invert(1); opacity: 1; }
        .modal-server-banner {
            background: linear-gradient(135deg, #20445d 0%, #162f42 100%);
            color: white;
            padding: 13px 18px;
            border-radius: 10px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .modal-server-banner .server-name { font-size: 15px; font-weight: 700; line-height: 1.2; }
        .modal-server-banner .server-meta { font-size: 11px; opacity: 0.85; margin-top: 4px; display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .info-section { background: #f8fafd; border-radius: 10px; padding: 13px 16px; margin-bottom: 13px; border: 1px solid #e2e8f0; }
        .info-section h6 { font-weight: 700; color: #1a3a5c; margin-bottom: 8px; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; border-bottom: 1px solid #e2e8f0; padding-bottom: 6px; }
        .info-row { display: flex; padding: 5px 0; border-bottom: 1px solid #f0f4f8; }
        .info-row:last-child { border-bottom: none; }
        .info-label-modal { width: 42%; font-weight: 600; color: #64748b; font-size: 11px; }
        .info-value-modal { width: 58%; color: #1e293b; font-size: 11px; font-weight: 500; word-break: break-word; }

        /* ============================================================
           12. PAGINAÇÃO
        ============================================================ */
        .pagination-container {
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px 20px;
            background: white;
            border-top: 1px solid #dee2e6;
            width: 100%;
            gap: 12px;
            flex-wrap: wrap;
        }
        .pagination-info { font-size: 12px; color: #6c757d; }
        .pagination .page-link { color: var(--primary-dark); border-color: #dee2e6; font-size: 13px; padding: 4px 10px; }
        .pagination .page-link:hover { color: var(--accent-red); background-color: #f8f9fa; }
        .pagination .page-item.active .page-link { background-color: var(--primary-dark); border-color: var(--primary-dark); color: white; }
        .items-per-page {
            height: 34px;
            min-width: 80px;
            border-radius: 8px;
            border: 1px solid #d6dee6;
            padding: 4px 28px 4px 10px;
            font-size: 13px;
            font-weight: 600;
            color: #1a3a5c;
            background-color: #ffffff;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            background-image: url("data:image/svg+xml;utf8,<svg fill='%231a3a5c' height='20' viewBox='0 0 24 24' width='20' xmlns='http://www.w3.org/2000/svg'><path d='M7 10l5 5 5-5z'/></svg>");
            background-repeat: no-repeat;
            background-position: right 6px center;
        }

        /* ============================================================
           13. BUSCA NA TABELA
        ============================================================ */
        .table-search-container {
            display: flex;
            align-items: center;
            white-space: nowrap;
            background: #ffffff;
            border: 1px solid #d6dee6;
            border-radius: 8px;
            padding: 5px 10px;
            height: 34px;
        }
        .table-search-container:hover { border-color: #1a3a5c; }
        .table-search-input { border: none !important; outline: none; background: transparent; font-size: 12px; width: 220px; color: #1a3a5c; }
        .table-search-input::placeholder { color: #94a3b8; }
        .table-search-input:disabled { opacity: 0.5; cursor: not-allowed; }

        /* ============================================================
           14. BADGES
        ============================================================ */
        .badge-sit { padding: 3px 8px; border-radius: 20px; font-size: 10.5px; font-weight: 700; display: inline-block; letter-spacing: 0.2px; }
        .badge-doacao   { background: #dcf5e7; color: #0f6b3a; border: 1px solid #b2e6c8; }
        .badge-comodato { background: #fff8e1; color: #7a5b00; border: 1px solid #ffe082; }
        .badge-publico  { background: #e0f0ff; color: #0a4a82; border: 1px solid #b3d4f5; }
        .badge-privado  { background: #f0f2f5; color: #4a5568; border: 1px solid #dce3ec; }
        .badge-outro    { background: #f0f2f5; color: #4a5568; border: 1px solid #dce3ec; }

        /* ============================================================
           15. TOOLBAR
        ============================================================ */
        .toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; flex-wrap: wrap; gap: 8px; }
        .toolbar-left  { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
        .toolbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }

        /* ============================================================
           16. LOADING
        ============================================================ */
        .loading-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(238,241,246,0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            gap: 14px;
        }
        .loading-progress { font-size: 13px; color: #20445d; font-weight: 700; }

        /* ============================================================
           17. TOAST
        ============================================================ */
        .toast-sucesso {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #e6f4ea;
            color: #1e4620;
            border-radius: 12px;
            padding: 14px 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            display: none;
            align-items: center;
            justify-content: center;
            gap: 10px;
            z-index: 9999;
            min-width: 280px;
        }
        .toast-content { display: flex; align-items: center; justify-content: center; width: 100%; text-align: center; gap: 10px; }
        .toast-content i { color: #28a745; font-size: 14px; }
        .toast-close { cursor: pointer; font-size: 14px; margin-left: 10px; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* ============================================================
           18. HINT BUSCA MÍNIMO
        ============================================================ */
        .search-hint { font-size: 10px; color: #94a3b8; margin-top: 3px; }
        .search-hint.warn { color: #b93c42; }

        /* ============================================================
           19. RESPONSIVIDADE
        ============================================================ */
        @media (max-width: 992px) {
            .container-fluid, .dashboard-container { padding: 0 15px; }
            .modal-full-custom { max-width: 95% !important; width: 95% !important; }
        }
        @media (max-width: 768px) {
            .filters-row { flex-direction: column; align-items: stretch; }
            .filter-group { min-width: 100%; }
            .toolbar { flex-direction: column; align-items: stretch; }
            .table-search-input { width: 100% !important; }
        }
    </style>
</head>
<body class="iframe-mode">

<div class="main-container">
    <div class="container-fluid dashboard-container">

        <!-- Abas -->
        <div class="nav-tabs-container">
            <ul class="nav nav-tabs" id="dashboardTabs" role="tablist">
                <li class="nav-item">
                    <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#visao">
                        <i class="material-icons">bar_chart</i>Visão Geral
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" id="consulta-tab-btn" data-bs-toggle="tab" data-bs-target="#consulta">
                        <i class="material-icons">search</i>Consulta Individual
                    </button>
                </li>
                <li class="nav-item">
                    <button class="nav-link" data-bs-toggle="tab" data-bs-target="#downloads">
                        <i class="material-icons">download</i>Downloads
                    </button>
                </li>
            </ul>
        </div>

        <!-- Data de atualização -->
        <div class="data-atualizacao-container">
            <div class="data-atualizacao-box">
                <i class="material-icons">event</i>
                Data de atualização: <span id="data-atualizacao-header" style="margin-left:4px;">carregando...</span>
            </div>
        </div>

        <!-- Conteúdo das abas -->
        <div class="tab-content" id="dashboardTabsContent">
            <div class="tab-pane fade show active" id="visao" role="tabpanel">
                <div id="visao-content"></div>
            </div>
            <div class="tab-pane fade" id="consulta" role="tabpanel">
                <div id="consulta-content"></div>
            </div>
            <div class="tab-pane fade" id="downloads" role="tabpanel">
                <div id="downloads-content"></div>
            </div>
        </div>

    </div>

/**

 * Aplica trim e trata espaços em branco extras antes de buscar no mapa.
 * Se não encontrar correspondência exata, retorna o valor original.
 */
function normalizarOrgao(nome) {
    if (!nome) return nome;
    const limpo = nome.trim().replace(/\s+/g, ' ');
    return ORGAO_DE_PARA[limpo] || limpo;
}

// Extrai o ano de ano_instrumento, que pode vir como "2025,0" → "2025"
function extrairAno(val) {
    if (!val) return '';
    const s = String(val).trim();
    const m = s.match(/\b(19|20)\d{2}\b/);
    if (m) return m[0];
    const clean = s.replace(/[^0-9]/g, '');
    return clean.length >= 4 ? clean.slice(0, 4) : '';
}

async function carregarDados() {
    mostrarLoading(true, 'Carregando dados de Doações e Comodatos...');
    try {
        const [respAtual, respHistorico] = await Promise.all([
            fetch(CSV_URL),
            fetch(CSV_HISTORICO_URL)
        ]);
        const [csvAtual, csvHistorico] = await Promise.all([
            respAtual.text(),
            respHistorico.text()
        ]);

        const resultAtual = Papa.parse(csvAtual, {
            header: true, delimiter: ';', skipEmptyLines: true
        });

        const resultHistorico = Papa.parse(csvHistorico, {
            header: true, delimiter: ';', skipEmptyLines: true
        });

        // Processa dados atuais — aplica normalizarOrgao no orgao_recebedor
        const dadosAtuais = resultAtual.data.map(row => ({
            tipo_instrumento:       (row.tipo_instrumento || '').trim(),
            ano_instrumento:        extrairAno(row.ano_instrumento),
            mes_instrumento:        (row.mes_instrumento  ? String(row.mes_instrumento).replace(/[^0-9]/g,'').trim() : ''),
            categoria_valor:        (row.categoria_valor  || '').trim(),
            orgao_recebedor:        normalizarOrgao((row.orgao_recebedor  || '').trim()),
            codigo_orgao_recebedor: (row.codigo_orgao_recebedor || '').trim(),
            natureza_doador:        (row.natureza_doador  || '').trim(),
            doador_comodante:       (row.doador_comodante || '').trim(),
            objeto_descritivo:      (row.objeto_descritivo || '').trim(),
            quantidade_objeto:      (row.quantidade_objeto || '1').trim(),
            vigencia:               (row.vigencia || '').trim(),
            processo_sei:           (row.processo_sei || '').trim(),
            recurso_tjmg_ou_mpmg:   (row.recurso_tjmg_ou_mpmg || '').trim(),
            _fonte: 'atual'
        })).filter(item => item.tipo_instrumento);

        const anosAtuais = new Set(dadosAtuais.map(d => d.ano_instrumento).filter(Boolean));

        // Processa dados históricos — aplica normalizarOrgao no orgao_recebedor
        const dadosHistoricos = resultHistorico.data.map(row => {
            const anoHist = extrairAno(row.ano || '');
            const objeto = (row.objeto || '').trim();
            let tipo = 'Doação';
            const objLower = objeto.toLowerCase();
            if (objLower.startsWith('comodato')) tipo = 'Comodato';
            else if (objLower.includes('comodato')) tipo = 'Comodato';

            return {
                tipo_instrumento:       tipo,
                ano_instrumento:        anoHist,
                mes_instrumento:        '',
                categoria_valor:        '',
                orgao_recebedor:        normalizarOrgao((row.orgao_entidade || '').trim()),
                codigo_orgao_recebedor: (row.codigo_orgao_entidade || '').trim(),
                natureza_doador:        '',
                doador_comodante:       (row.doador_comodante || '').trim(),
                objeto_descritivo:      objeto,
                quantidade_objeto:      (row.quantitativo || '1').trim(),
                vigencia:               (row.vigencia || '').trim(),
                processo_sei:           (row.processo_sei || '').trim(),
                recurso_tjmg_ou_mpmg:   '',
                _fonte: 'historico'
            };
        }).filter(item => {
            return item.ano_instrumento && !anosAtuais.has(item.ano_instrumento) && item.orgao_recebedor;
        });

        dadosCompletos = [...dadosHistoricos, ...dadosAtuais];

        const dataEl = document.getElementById('data-atualizacao-header');
        if (dataEl) dataEl.textContent = new Date().toLocaleDateString('pt-BR');

        mostrarLoading(false);
        renderVisaoGeral();
        renderDownloads();

    } catch (error) {
        mostrarLoading(false);
        document.getElementById('visao-content').innerHTML = '<div class="alert alert-danger m-3">Erro ao carregar dados. Verifique a conexão.</div>';
    }
}

        dados = dados.filter(d => (d.orgao_recebedor||'').toLowerCase().includes(orgLower));
    }

    const total = dados.length;
    const doacoes   = dados.filter(d => d.tipo_instrumento.toLowerCase().includes('doa')).length;
    const comodatos = dados.filter(d => d.tipo_instrumento.toLowerCase().includes('comodato')).length;

        orgaosMap[org].total++;
        const qtd = parseInt(d.quantidade_objeto) || 1;
        orgaosMap[org].qtdBens += qtd;

        else orgaosMap[org].comodatos++;

        if (typeof vb === 'string') vb = vb.toLowerCase();
        return ordenacaoVisao.dir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });

        const ativo = ordenacaoVisao.col === col;

        return `<th class="sortable-header text-center" onclick="ordenarVisao('${col}')">
            ${label} <i class="material-icons">${icon}</i>
        </th>`;
    };
    const thSortLeft = (col, label) => {
        const ativo = ordenacaoVisao.col === col;
        const icon  = ativo ? (ordenacaoVisao.dir === 'asc' ? 'arrow_upward' : 'arrow_downward') : 'unfold_more';
        return `<th class="sortable-header" onclick="ordenarVisao('${col}')">
            ${label} <i class="material-icons">${icon}</i>
        </th>`;
    };

    const html = `
    <!-- FILTROS -->
    <div class="filter-container">
        <div class="filters-row">
            <div class="filter-group" style="flex:0 0 auto;">
                <label class="filter-label">Ano</label>

                    <option value="">Todos</option>
                    ${anosDisp.map(a => `<option value="${a}" ${filtroVisao.ano === a ? 'selected' : ''}>${a}</option>`).join('')}
                </select>
            </div>
            <div class="filter-group">
                <label class="filter-label">Órgão Recebedor</label>
                <input class="form-control" id="vg-orgao" placeholder="Filtrar por órgão..." value="${filtroVisao.orgao || ''}">

            <button class="btn-pesquisa" onclick="aplicarFiltroVisao()">
                <i class="material-icons">search</i> Pesquisar
            </button>

                <i class="material-icons">clear</i> Limpar
            </button>
        </div>
    </div>

    <!-- CARDS MÉTRICAS -->
    <div class="row g-3 mb-4">
        <div class="col-6 col-md-3">
            <div class="metric-card">
                <div class="metric-header">Total de Registros <i class="material-icons" data-bs-toggle="tooltip" title="Total de instrumentos no período">info_outline</i></div>

function filtrarTabelaVG(valor) {
    valor = valor.toLowerCase();
    document.querySelectorAll('#tbodyVisao tr').forEach(tr => {
        tr.style.display = tr.textContent.toLowerCase().includes(valor) ? '' : 'none';
    });
}

function mudarPagVisao(p) {
    if (p < 1) return;
    paginaVisao = p;
    renderVisaoGeral();
}

function ordenarVisao(col) {
    ordenacaoVisao = { col, dir: ordenacaoVisao.col === col && ordenacaoVisao.dir === 'asc' ? 'desc' : 'asc' };
    renderVisaoGeral();
}

function aplicarFiltroVisao() {
    filtroVisao.ano   = document.getElementById('vg-ano').value;
    filtroVisao.orgao = document.getElementById('vg-orgao').value;
    paginaVisao = 1;
    renderVisaoGeral();
}

function limparFiltroVisao() {
    filtroVisao = { ano: '', orgao: '' };
    paginaVisao = 1;
    renderVisaoGeral();
}

function irParaOrgao(orgao) {
    filtroConsulta = { ano: filtroVisao.ano || '', tipo: '', orgao: orgao, natureza: '', doador: '', palavra: '' };
    paginaConsulta = 1;
    buscaRapida = '';
    document.getElementById('consulta-tab-btn').click();
    renderConsulta();
}

function exportarVisaoCSV() {
    let dados = dadosCompletos;
    if (filtroVisao.ano)   dados = dados.filter(d => d.ano_instrumento === filtroVisao.ano);
    if (filtroVisao.orgao) dados = dados.filter(d => (d.orgao_recebedor||'').toLowerCase().includes(filtroVisao.orgao.toLowerCase()));
    const orgaosMap = {};
    for (const d of dados) {
        const org = d.orgao_recebedor || 'NÃO INFORMADO';
        if (!orgaosMap[org]) orgaosMap[org] = { orgao: org, qtdBens: 0, total: 0, doacoes: 0, comodatos: 0 };
        orgaosMap[org].total++;
        orgaosMap[org].qtdBens += parseInt(d.quantidade_objeto) || 1;
        if (d.tipo_instrumento.toLowerCase().includes('doa')) orgaosMap[org].doacoes++;
        else orgaosMap[org].comodatos++;
    }
    const csv = Papa.unparse(Object.values(orgaosMap), { delimiter: ';' });
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `visao_geral_orgaos.csv`; a.click();
}

function exportarVisaoPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    doc.setFontSize(11);
    doc.text(`Doações e Comodatos — Visão Geral por Órgão${filtroVisao.ano ? ' (' + filtroVisao.ano + ')' : ''}`, 14, 10);
    let dados = dadosCompletos;
    if (filtroVisao.ano)   dados = dados.filter(d => d.ano_instrumento === filtroVisao.ano);
    if (filtroVisao.orgao) dados = dados.filter(d => (d.orgao_recebedor||'').toLowerCase().includes(filtroVisao.orgao.toLowerCase()));
    const orgaosMap = {};
    for (const d of dados) {
        const org = d.orgao_recebedor || 'NÃO INFORMADO';
        if (!orgaosMap[org]) orgaosMap[org] = { qtdBens: 0, total: 0, doacoes: 0, comodatos: 0 };
        orgaosMap[org].total++;
        orgaosMap[org].qtdBens += parseInt(d.quantidade_objeto) || 1;
        if (d.tipo_instrumento.toLowerCase().includes('doa')) orgaosMap[org].doacoes++;
        else orgaosMap[org].comodatos++;
    }
    const rows = Object.entries(orgaosMap).map(([n, i]) => [n, i.qtdBens, i.total, i.doacoes, i.comodatos]);
    doc.autoTable({
        startY: 16,
        head: [['Órgão Recebedor', 'Qtd. Bens', 'Registros', 'Doações', 'Comodatos']],
        body: rows,
        foot: [['TOTAL GERAL', rows.reduce((a,r)=>a+r[1],0), rows.reduce((a,r)=>a+r[2],0), rows.reduce((a,r)=>a+r[3],0), rows.reduce((a,r)=>a+r[4],0)]],
        headStyles: { fillColor: [32, 68, 93] },
        footStyles: { fillColor: [223, 227, 232], textColor: [0,0,0], fontStyle: 'bold' },
        didDrawPage: () => { doc.setFontSize(9); doc.text(`Emitido em: ${new Date().toLocaleString('pt-BR')}`, 14, doc.internal.pageSize.height - 5); }
    });
    doc.save(`visao_geral_orgaos.pdf`);
}

function renderConsulta() {
    dadosFiltrados = dadosCompletos.filter(item => {
        if (filtroConsulta.ano     && item.ano_instrumento !== filtroConsulta.ano) return false;
        if (filtroConsulta.tipo    && !(item.tipo_instrumento||'').toLowerCase().includes(filtroConsulta.tipo.toLowerCase())) return false;
        if (filtroConsulta.orgao   && !(item.orgao_recebedor||'').toLowerCase().includes(filtroConsulta.orgao.toLowerCase())) return false;
        if (filtroConsulta.natureza && !(item.natureza_doador||'').toLowerCase().includes(filtroConsulta.natureza.toLowerCase())) return false;
        if (filtroConsulta.doador  && !(item.doador_comodante||'').toLowerCase().includes(filtroConsulta.doador.toLowerCase())) return false;
        if (buscaRapida && buscaRapida.length >= 30) {
            const busca = buscaRapida.toLowerCase();
            const campos = [item.objeto_descritivo, item.doador_comodante, item.orgao_recebedor, item.processo_sei];
            if (!campos.some(c => (c||'').toLowerCase().includes(busca))) return false;
        }
        return true;
    });

    dadosFiltrados.sort((a, b) => {
        let va = a[ordenacaoConsulta.col] || '';
        let vb = b[ordenacaoConsulta.col] || '';
        if (ordenacaoConsulta.col === 'ano_instrumento') { va = parseInt(va)||0; vb = parseInt(vb)||0; }
        if (typeof va === 'string') va = va.toLowerCase();
        if (typeof vb === 'string') vb = vb.toLowerCase();
        return ordenacaoConsulta.dir === 'asc' ? (va > vb ? 1 : -1) : (va < vb ? 1 : -1);
    });

    const total = dadosFiltrados.length;
    const totalPags = Math.ceil(total / itensPorPaginaConsulta);
    paginaConsulta = Math.min(paginaConsulta, Math.max(1, totalPags));
    const inicio = (paginaConsulta - 1) * itensPorPaginaConsulta;
    const pagina = dadosFiltrados.slice(inicio, inicio + itensPorPaginaConsulta);

    const anosDisp   = [...new Set(dadosCompletos.map(d => d.ano_instrumento).filter(a => a && a !== '0' && /^(19|20)\d{2}$/.test(a)))].sort();
    const tiposDisp  = [...new Set(dadosCompletos.map(d => d.tipo_instrumento).filter(Boolean))].sort();
    const orgaosDisp = [...new Set(dadosCompletos.map(d => d.orgao_recebedor).filter(Boolean))].sort();

    const thC = (col, label) => {
        const ativo = ordenacaoConsulta.col === col;
        const icon  = ativo ? (ordenacaoConsulta.dir === 'asc' ? 'arrow_upward' : 'arrow_downward') : 'unfold_more';
        return `<th class="sortable-header text-center" onclick="ordenarConsulta('${col}')">
            ${label} <i class="material-icons">${icon}</i>
        </th>`;
    };

    const charCount = buscaRapida.length;
    const restante  = Math.max(0, 30 - charCount);
    const hintClass = charCount > 0 && charCount < 30 ? 'warn' : '';
    const hintMsg   = charCount === 0
        ? 'Digite ao menos 30 caracteres para buscar'
        : (charCount < 30 ? `Ainda faltam ${restante} caractere(s)` : `✔ Busca ativa (${charCount} caracteres)`);

    const html = `
    <!-- FILTROS -->
    <div class="filter-container">
        <div class="consulta-filters-row">
            <div class="consulta-filter-group">
                <label class="filter-label">Ano</label>
                <select class="form-select modern-select" id="ci-ano">
                    <option value="">Todos</option>
                    ${anosDisp.map(a => `<option value="${a}" ${filtroConsulta.ano === a ? 'selected' : ''}>${a}</option>`).join('')}
                </select>
            </div>
            <div class="consulta-filter-group">
                <label class="filter-label">Tipo de Instrumento</label>
                <select class="form-select modern-select" id="ci-tipo">
                    <option value="">Todos</option>
                    ${tiposDisp.map(t => `<option value="${t}" ${filtroConsulta.tipo === t ? 'selected' : ''}>${t}</option>`).join('')}
                </select>
            </div>
            <div class="consulta-filter-group">
                <label class="filter-label">Órgão Recebedor</label>
                <select class="form-select modern-select" id="ci-orgao">
                    <option value="">Todos</option>
                    ${orgaosDisp.map(o => `<option value="${o}" ${filtroConsulta.orgao === o ? 'selected' : ''}>${o}</option>`).join('')}
                </select>
            </div>
            <div class="consulta-filter-group">
                <label class="filter-label">Natureza do Doador</label>
                <select class="form-select modern-select" id="ci-natureza">
                    <option value="">Todas</option>
                    <option value="Público"  ${filtroConsulta.natureza === 'Público'  ? 'selected' : ''}>Público</option>
                    <option value="Privado"  ${filtroConsulta.natureza === 'Privado'  ? 'selected' : ''}>Privado</option>
                </select>
            </div>
            <div class="consulta-filter-group">
                <label class="filter-label">Doador / Comodante</label>
                <input class="form-control" id="ci-doador" placeholder="Nome do doador..." value="${filtroConsulta.doador}">
            </div>
        </div>
        <div class="consulta-buttons-row">
            <button class="btn-pesquisa" onclick="aplicarFiltroConsulta()">
                <i class="material-icons">search</i> Pesquisar
            </button>
            <button class="btn-secondary-custom" onclick="limparFiltroConsulta()">
                <i class="material-icons">clear</i> Limpar Filtros
            </button>
        </div>
    </div>

    <!-- TOOLBAR -->
    <div class="toolbar">
        <div class="toolbar-left">
            <button class="btn-export" onclick="exportarConsultaCSV()">
                <i class="material-icons">description</i> CSV
            </button>
            <button class="btn-export" onclick="exportarConsultaPDF()">
                <i class="material-icons">print</i> PDF
            </button>
            <button class="btn-export" onclick="copiarLinkDireto()">
                <i class="material-icons">link</i> Copiar Link
            </button>
        </div>
        <div class="toolbar-right">
            <span class="table-badge" id="badgeTotalConsulta">${total.toLocaleString('pt-BR')} registros</span>
            <div>
                <div class="table-search-container">
                    <i class="material-icons" style="font-size:14px;color:#94a3b8;">search</i>
                    <input class="table-search-input"
                        id="buscaRapidaInput"

                </div>
                <div class="search-hint ${hintClass}" id="searchHint">${hintMsg}</div>
            </div>
        </div>
    </div>

    <!-- TABELA -->
    <div class="table-container">
        <div class="table-fixed-header-container">
            <table class="table" id="tabConsulta">
                <thead>
                    <tr>
                        ${thC('ano_instrumento', 'Ano')}
                        <th class="text-center">Tipo</th>
                        <th>Órgão Recebedor</th>
                        <th>Objeto</th>

                        <th class="text-center">Ação</th>
                    </tr>
                </thead>
                <tbody>
                    ${pagina.map((item, idx) => `
                    <tr>
                        <td class="text-center">${item.ano_instrumento || '-'}${item.mes_instrumento ? '/' + item.mes_instrumento : ''}</td>
                        <td class="text-center">${badgeTipo(item.tipo_instrumento)}</td>
                        <td><a class="orgao-link" onclick="irParaOrgaoConsulta('${escapar(item.orgao_recebedor)}')">${(item.orgao_recebedor||'-').substring(0,45)}</a></td>
                        <td title="${escapar(item.objeto_descritivo)}">${(item.objeto_descritivo||'-').substring(0,55)}${(item.objeto_descritivo||'').length > 55 ? '…' : ''}</td>
                        <td class="text-center">${item.quantidade_objeto || '1'}</td>
                        <td>${(item.doador_comodante||'-').substring(0,40)}</td>

                        <td class="text-center">
                            <button class="btn-action" title="Ver detalhes" onclick="abrirModal(${inicio + idx})">
                                <i class="material-icons" style="font-size:15px">visibility</i>
                            </button>
                        </td>
                    </tr>`).join('')}
                    ${pagina.length === 0 ? `<tr><td colspan="8" class="text-center text-muted py-4" style="font-size:13px">Nenhum registro encontrado.</td></tr>` : ''}
                </tbody>
            </table>
        </div>
    </div>

    <!-- PAGINAÇÃO -->
    <div class="pagination-container">
        <div class="pagination-info">Página ${paginaConsulta} de ${totalPags || 1} — ${total.toLocaleString('pt-BR')} registros</div>
        <nav>
            <ul class="pagination mb-0">
                <li class="page-item ${paginaConsulta <= 1 ? 'disabled' : ''}">
                    <a class="page-link" href="#" onclick="mudarPagConsulta(${paginaConsulta-1});return false;">«</a>
                </li>

function onBuscaRapida(val) {
    buscaRapida = val;
    const hint = document.getElementById('searchHint');
    const count = val.length;
    const restante = Math.max(0, 30 - count);
    if (count === 0) {
        hint.className = 'search-hint';
        hint.textContent = 'Digite ao menos 30 caracteres para buscar';
    } else if (count < 30) {
        hint.className = 'search-hint warn';
        hint.textContent = `Ainda faltam ${restante} caractere(s)`;
    } else {
        hint.className = 'search-hint';
        hint.textContent = `✔ Busca ativa (${count} caracteres)`;
    }
    if (count >= 30 || count === 0) {
        paginaConsulta = 1;
        renderConsulta();
    }
}

function irParaOrgaoConsulta(orgao) {
    filtroConsulta.orgao = orgao;
    paginaConsulta = 1;
    renderConsulta();
}

function mudarPagConsulta(p) { if (p >= 1) { paginaConsulta = p; renderConsulta(); } }
function ordenarConsulta(col) {
    ordenacaoConsulta = { col, dir: ordenacaoConsulta.col === col && ordenacaoConsulta.dir === 'asc' ? 'desc' : 'asc' };
    renderConsulta();
}

function aplicarFiltroConsulta() {
    filtroConsulta.ano      = document.getElementById('ci-ano').value;
    filtroConsulta.tipo     = document.getElementById('ci-tipo').value;
    filtroConsulta.orgao    = document.getElementById('ci-orgao').value;
    filtroConsulta.natureza = document.getElementById('ci-natureza').value;
    filtroConsulta.doador   = document.getElementById('ci-doador').value;
    paginaConsulta = 1;
    renderConsulta();
}

function limparFiltroConsulta() {
    filtroConsulta = { ano: '', tipo: '', orgao: '', natureza: '', doador: '', palavra: '' };
    buscaRapida = '';
    paginaConsulta = 1;
    renderConsulta();
}

function exportarConsultaCSV() {
    const csv = Papa.unparse(dadosFiltrados, { delimiter: ';' });
    const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv' });
    const a = document.createElement('a'); a.href = URL.createObjectURL(blob);
    a.download = `doacoes_comodatos_consulta.csv`; a.click();
}

function exportarConsultaPDF() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: 'landscape' });
    doc.setFontSize(11);

    const linhas = dadosFiltrados.slice(0, 500).map(i => [
        i.ano_instrumento || '-',

}

// IFRAME RESIZE
(function () {
    function sendHeight() {
        const h = Math.max(document.body.scrollHeight, document.documentElement.scrollHeight) + 10;
        try { window.parent.postMessage({ iframeHeight: h, iframeResize: true, type: 'resize' }, '*'); } catch(e) {}
    }
    if (window.ResizeObserver) new ResizeObserver(sendHeight).observe(document.body);
    else { window.addEventListener('resize', sendHeight); setInterval(sendHeight, 2000); }
    sendHeight();
})();
